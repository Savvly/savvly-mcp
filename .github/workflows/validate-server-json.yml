name: Validate server.json

on:
  push:
    branches: [main]
    paths:
      - server.json
      - .github/workflows/validate-server-json.yml
  pull_request:
    paths:
      - server.json
      - .github/workflows/validate-server-json.yml

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate against MCP Registry v0.1
        run: |
          set -euo pipefail
          PAYLOAD=$(cat server.json)
          RESPONSE=$(curl -sS --max-time 30 \
            -X POST https://registry.modelcontextprotocol.io/v0.1/validate \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          echo "Registry response: $RESPONSE"
          VALID=$(echo "$RESPONSE" | jq -r '.valid // false')
          if [[ "$VALID" != "true" ]]; then
            echo "::error::server.json failed registry validation"
            echo "$RESPONSE" | jq '.issues // .'
            exit 1
          fi

      - name: Sanity-check description length (<=100 chars)
        run: |
          set -euo pipefail
          LEN=$(jq -r '.description | length' server.json)
          echo "description length: $LEN"
          if [[ "$LEN" -gt 100 ]]; then
            echo "::error::description is $LEN chars, registry v0.1 caps at 100"
            exit 1
          fi
